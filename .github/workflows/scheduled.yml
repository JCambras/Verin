name: scheduled

# Charter #13: a scheduled job exercises the audit-chain verifier daily against a
# freshly seeded store (it proves the verifier RUNS, not the integrity of any
# long-lived store — pointing it at a persistent store is a recorded deferral,
# D-017, trigger = managed Postgres lands). Charter #11 / D-010: the nightly load
# job currently runs the SAME pilot-scale smoke as the per-PR gate in ci.yml;
# scaling the nightly run past pilot is deferred (D-018). Also runnable on demand.
on:
  schedule:
    - cron: "17 6 * * *" # 06:17 UTC daily
  workflow_dispatch:

# Least-privilege token (charter #15).
permissions:
  contents: read

env:
  TZ: America/New_York
  APP_ENV: development
  APP_URL: http://localhost:3000
  FIRM_TIMEZONE: America/New_York
  VERIN_STORE_DRIVER: pglite
  VERIN_DATA_DIR: .verin-data-scheduled
  SESSION_SECRET: ci-only-session-secret-not-a-real-secret-0000000000
  ESIGN_WEBHOOK_SECRET: ci-only-webhook-secret-not-a-real-secret-0000000000
  LOG_LEVEL: error

jobs:
  audit-chain-verify:
    name: audit-chain-verify (scheduled, seeded-store verifier run, charter #13)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: seed + verify chain
        run: pnpm db:seed && pnpm audit:chain

  load-nightly:
    name: load-smoke (scheduled; same pilot-scale run as the PR gate — nightly scale-up deferred, D-018)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: load-smoke
        run: pnpm load:smoke

  backup-restore-drill:
    name: backup-restore drill (charter #11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: backup-restore drill
        run: pnpm exec tsx scripts/backup-restore-drill.ts
