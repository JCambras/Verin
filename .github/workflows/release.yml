name: release

# Charter #15: an SBOM is generated on release.
on:
  release:
    types: [published]
  workflow_dispatch:

# Least-privilege token (charter #15).
permissions:
  contents: read

jobs:
  sbom:
    name: sbom (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: generate SBOM
        run: pnpm sbom
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          retention-days: 90
