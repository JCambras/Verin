name: ci

# Charter non-negotiables enforced here. Every gate is BLOCKING (never advisory —
# charter #15). Tests and E2E run on a NON-UTC clock (charter #8; retro #39).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege token (charter #15): every job reads the repo, nothing writes.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TZ: America/New_York
  # App-boot vars the config module requires (placeholders; never real secrets).
  APP_ENV: development
  APP_URL: http://localhost:3000
  FIRM_TIMEZONE: America/New_York
  VERIN_STORE_DRIVER: pglite
  VERIN_DATA_DIR: .verin-data-ci
  SESSION_SECRET: ci-only-session-secret-not-a-real-secret-0000000000
  ESIGN_WEBHOOK_SECRET: ci-only-webhook-secret-not-a-real-secret-0000000000
  LOG_LEVEL: error

jobs:
  quality:
    name: quality (typecheck, lint, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm build

  test:
    name: test (unit, integration, fitness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: unit + integration + fitness
        run: pnpm test

  knip:
    name: knip (dead-export / dead-code)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: knip
        run: pnpm knip

  e2e:
    name: e2e (Playwright + axe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: e2e + axe
        run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  secret-scan:
    name: secret-scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Required on pull_request events: the action fetches PR commits via the API.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  sast:
    name: sast (semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: semgrep
        # `semgrep scan --error` is the self-contained blocking SAST gate: exit
        # non-zero on any finding. (`semgrep ci` targets the Semgrep AppSec
        # Platform — it needs SEMGREP_APP_TOKEN and rejects `--error`.)
        # `regex_dos` (njsscan) is a purely syntactic heuristic that flags EVERY
        # `regexp.test(x)` — it cannot tell user input from build-time source text
        # or startup config, and produced only false positives here (ADR-0017).
        # All other njsscan rules stay blocking; specific instances are triaged
        # in-code with `// nosemgrep: <rule> -- <reason>`.
        run: >-
          semgrep scan
          --config p/typescript --config p/react --config p/nodejsscan --config p/secrets
          --exclude-rule ajinabraham.njsscan.dos.regex_dos.regex_dos
          --error

  dependency-audit:
    name: dependency-audit (pnpm audit + license/vuln review)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit (high+)
        run: pnpm audit --audit-level=high
      - name: license audit (reviewed allowlist, deny GPL/AGPL/unknown)
        run: pnpm license:audit

  provenance-trace:
    name: provenance-trace (displayed metric -> source, charter #3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: provenance-trace
        # Schema half (fields carry provenance; synthetic can't feed compliance) +
        # DISPLAY half (Vale V12): every metric-class render carries source/asOf, and
        # a value DERIVED from synthetic input is itself a demonstration (ADR-0022).
        run: pnpm exec vitest run src/__tests__/fitness/provenance-required.test.ts src/__tests__/fitness/no-unlabeled-synthetic.test.ts src/__tests__/fitness/metric-provenance.test.ts src/__tests__/fitness/derived-provenance.test.ts src/__tests__/fitness/no-pii-in-audit-store.test.ts

  audit-chain-verify:
    name: audit-chain-verify (charter #13)
    runs-on: ubuntu-latest
    env:
      VERIN_DATA_DIR: .verin-data-ci
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: seed + verify org audit chains
        run: pnpm db:seed && pnpm audit:chain

  load-smoke:
    name: load-smoke (p95 regression gate, charter #11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: load-smoke
        run: pnpm load:smoke
